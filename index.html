<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Inteligente de Lojas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  background:#1f1f1f;
  color:#fff;
  font-family:Arial;
  padding:10px;
}

h2{
  text-align:center;
}

.topo{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#2b2b2b;
  padding:12px;
  border-radius:10px;
  border:2px solid #ff5252;
  flex:1 1 220px;
}

input, select{
  padding:6px;
  border-radius:6px;
  border:none;
  width:100%;
  margin-top:5px;
}

.container{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.box{
  flex:1 1 300px;
  background:#2b2b2b;
  padding:10px;
  border-radius:10px;
  border:2px solid #ff5252;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#ff5252;
  padding:6px;
}

td{
  padding:5px;
  border-bottom:1px solid #444;
}

.falta{ background:#b71c1c; }
.ok{ background:#1b5e20; }
.excesso{ background:#e65100; }

.transfer{ background:#1565c0; }

</style>
</head>

<body>

<h2>Painel Inteligente de Transferência</h2>

<div class="topo">

<div class="card">
Loja:
<select id="loja" onchange="render()">
<option>Agulhas Negras</option>
<option>Pedra</option>
<option>Vargem Grande</option>
<option>Ilha de Guaratiba</option>
</select>
</div>

<div class="card">
ABC:
<input type="file" onchange="carregarABC(event)">
</div>

<div class="card">
Estoque:
<input type="file" onchange="carregarEstoque(event)">
</div>

<div class="card">
Busca:
<input type="text" id="busca" oninput="render()">
</div>

<div class="card">
Grupo:
<input type="text" id="filtroGrupo" oninput="render()">
</div>

<div class="card">
Dias necessidade:
<input type="number" id="diasN" value="7" oninput="render()">
</div>

<div class="card">
Dias excesso:
<input type="number" id="diasE" value="14" oninput="render()">
</div>

</div>

<div class="container">

<div class="box">
<h3>ABC</h3>
<div id="abc"></div>
</div>

<div class="box">
<h3>Estoque</h3>
<div id="estoque"></div>
</div>

</div>

<div class="box">
<h3>Transferências</h3>
<div id="transf"></div>
</div>

<script>

let banco = {
"Agulhas Negras": {abc:[], estoque:[]},
"Pedra": {abc:[], estoque:[]},
"Vargem Grande": {abc:[], estoque:[]},
"Ilha de Guaratiba": {abc:[], estoque:[]}
};

function loja(){ return document.getElementById("loja").value }

function acharColuna(obj, nomes){
  return Object.keys(obj).find(k =>
    nomes.some(n => k.toLowerCase().includes(n))
  );
}

// ===== LOAD =====
function carregarABC(e){
let f = e.target.files[0];
let r = new FileReader();

r.onload = ev=>{
let wb = XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
let dados = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

if(!dados.length) return alert("ABC vazio");

let ex = dados[0];

let cGrupo = acharColuna(ex,["grupo"]);
let cProd = acharColuna(ex,["produto","descr","nome"]);
let cEst = acharColuna(ex,["estoque"]);
let cVend = acharColuna(ex,["vend","qtd"]);

dados = dados.map(l=>({
grupo:l[cGrupo]||"",
produto:(l[cProd]||"").toLowerCase(),
estoque:Number(l[cEst])||0,
vendidos:Number(l[cVend])||0
}));

banco[loja()].abc = dados;
render();
};

r.readAsArrayBuffer(f);
}

function carregarEstoque(e){
let f = e.target.files[0];
let r = new FileReader();

r.onload = ev=>{
let wb = XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
let dados = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

if(!dados.length) return alert("Estoque vazio");

let ex = dados[0];

let cGrupo = acharColuna(ex,["grupo"]);
let cNome = acharColuna(ex,["nome","descr"]);
let cEst = acharColuna(ex,["estoque"]);

dados = dados.map(l=>({
grupo:l[cGrupo]||"",
nome:(l[cNome]||"").toLowerCase(),
estoque:Number(l[cEst])||0
}));

banco[loja()].estoque = dados;
render();
};

r.readAsArrayBuffer(f);
}

// ===== COR =====
function cor(estoque, media){
let diasN = Number(document.getElementById("diasN").value);
let diasE = Number(document.getElementById("diasE").value);

let min = media * diasN;
let max = media * diasE;

if(estoque < min) return "falta";
if(estoque > max) return "excesso";
return "ok";
}

// ===== FILTRO =====
function filtro(p){
let busca = document.getElementById("busca").value.toLowerCase();
let grupo = document.getElementById("filtroGrupo").value.toLowerCase();

return (!busca || p.produto.includes(busca)) &&
       (!grupo || (p.grupo||"").toLowerCase().includes(grupo));
}

// ===== RENDER ABC =====
function renderABC(){
let dados = banco[loja()].abc.filter(filtro);

let html="<table><tr><th>Produto</th><th>Estoque</th><th>Vendidos</th><th>Média/dia</th></tr>";

dados.forEach(p=>{
let media = p.vendidos/30;
let classe = cor(p.estoque, media);

html+=`<tr class="${classe}">
<td>${p.produto}</td>
<td>${p.estoque}</td>
<td>${p.vendidos}</td>
<td>${media.toFixed(2)}</td>
</tr>`;
});

return html+"</table>";
}

// ===== RENDER ESTOQUE =====
function renderEstoque(){
let dados = banco[loja()].estoque;

let html="<table><tr><th>Produto</th><th>Estoque</th></tr>";

dados.forEach(p=>{
html+=`<tr>
<td>${p.nome}</td>
<td>${p.estoque}</td>
</tr>`;
});

return html+"</table>";
}

// ===== TRANSFER =====
function transferencias(){

let lojas = Object.keys(banco);
let map={};

lojas.forEach(l=>{
banco[l].abc.forEach(p=>{
if(!p.produto) return;

let m=p.vendidos/30;
if(m<=0) return;

if(!map[p.produto]) map[p.produto]=[];

map[p.produto].push({...p, loja:l, media:m});
});
});

let res=[];

Object.values(map).forEach(lista=>{

let precisa=[], sobra=[];

lista.forEach(p=>{
let n = p.media * document.getElementById("diasN").value - p.estoque;
let e = p.estoque - p.media * document.getElementById("diasE").value;

if(n>0) precisa.push({...p,qtd:Math.ceil(n)});
if(e>0) sobra.push({...p,qtd:Math.floor(e)});
});

precisa.forEach(p=>{
sobra.forEach(s=>{
let q=Math.min(p.qtd,s.qtd);
if(q>0){
res.push({produto:p.produto,de:s.loja,para:p.loja,qtd:q});
p.qtd-=q;
s.qtd-=q;
}
});
});

});

return res;
}

// ===== RENDER TRANSFER =====
function renderTransf(){
let lista = transferencias();
if(!lista.length) return "Sem transferência";

let html="<table><tr><th>Produto</th><th>De</th><th>Para</th><th>Qtd</th></tr>";

lista.forEach(t=>{
html+=`<tr class="transfer">
<td>${t.produto}</td>
<td>${t.de}</td>
<td>${t.para}</td>
<td>${t.qtd}</td>
</tr>`;
});

return html+"</table>";
}

// ===== RENDER GERAL =====
function render(){
document.getElementById("abc").innerHTML = renderABC();
document.getElementById("estoque").innerHTML = renderEstoque();
document.getElementById("transf").innerHTML = renderTransf();
}

</script>

</body>
</html>
