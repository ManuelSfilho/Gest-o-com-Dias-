<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Lojas</title>

<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  background:#a7a5a5;
  color:#f1f1f1;
  font-family:Arial;
  padding:20px;
}

.titulo{
  text-align:center;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
  font-weight:900;
}

.logo{
  width:110px;
  height:110px;
  object-fit:contain;
  border-radius:16px;
}

.topo{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.card,.cardestoque{
  background:#3a3a3a;
  padding:15px;
  border-radius:10px;
  border:2px solid #ff5252;
  box-shadow:0 0 10px rgba(255,82,82,0.2);
  text-align:center;
}

input, select{
  padding:8px;
  border-radius:6px;
  border:1px solid #666;
  background:#666464;
  color:#fff;
}

.container{
  display:flex;
  gap:20px;
}

.tabela-box{
  flex:1;
  background:#3a3a3a;
  padding:15px;
  border-radius:10px;
  border:2px solid #ff5252;
  overflow:auto;
}

th{
  background:#ff5252;
  padding:10px;
}

td{
  padding:8px;
  border-bottom:1px solid #555;
  font-weight:bold;
}

.baixo{ background:#ff5252; }
.alto{ background:#4caf50; }

</style>
</head>

<body>

<div class="topo">

<div class="card">
<b>Loja</b><br><br>
<select id="lojaSelecionada" onchange="renderTudo()">
<option>Agulhas Negras</option>
<option>Pedra</option>
<option>Vargem Grande</option>
<option>Ilha de Guaratiba</option>
</select>
</div>

<div class="card">
<b>ABC</b><br><br>
<input type="file" onchange="carregarABC(event)">
</div>

<div class="cardestoque">
<b>Estoque</b><br><br>
<input type="file" onchange="carregarEstoque(event)">
</div>

<div class="card">
<b>Dias</b><br><br>
Necessidade:
<input type="number" id="diasN" value="5" oninput="renderTudo()">
<br><br>
Excesso:
<input type="number" id="diasE" value="10" oninput="renderTudo()">
</div>

</div>

<div class="container">

<div class="tabela-box">
<h3>ABC</h3>
<input id="buscaABC" onkeyup="renderABC()" placeholder="Buscar">
<div id="tabelaABC"></div>
</div>

<div class="tabela-box">
<h3>Estoque</h3>
<input id="buscaEstoque" onkeyup="renderEstoque()" placeholder="Buscar">
<div id="tabelaEstoque"></div>
</div>

</div>

<div class="tabela-box">
<h3>Transferências</h3>
<div id="transferencias"></div>
</div>

<script>

let banco = {
"Agulhas Negras": {abc: [], estoque: []},
"Pedra": {abc: [], estoque: []},
"Vargem Grande": {abc: [], estoque: []},
"Ilha de Guaratiba": {abc: [], estoque: []}
};

function lojaAtual(){
  return document.getElementById("lojaSelecionada").value;
}

function acharColuna(obj, nomes){
  return Object.keys(obj).find(k =>
    nomes.some(n => k.toLowerCase().includes(n))
  );
}

// ===== ABC =====
function carregarABC(e){
const r = new FileReader();

r.onload = ev=>{
let wb = XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
let dados = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
if(!dados.length) return;

let ex = dados[0];

let cGrupo = acharColuna(ex,["grupo"]);
let cProd = acharColuna(ex,["produto","descr","nome"]);
let cEst = acharColuna(ex,["estoque"]);
let cVend = acharColuna(ex,["vend","qtd"]);

dados = dados.map(l=>({
grupo:l[cGrupo],
produto:l[cProd],
estoque:Number(l[cEst])||0,
vendidos:Number(l[cVend])||0,
raw:l
}));

banco[lojaAtual()].abc = dados;
renderTudo();
};

r.readAsArrayBuffer(e.target.files[0]);
}

// ===== ESTOQUE =====
function carregarEstoque(e){
const r = new FileReader();

r.onload = ev=>{
let wb = XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
let dados = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
if(!dados.length) return;

let ex = dados[0];

let cGrupo = acharColuna(ex,["grupo"]);
let cNome = acharColuna(ex,["nome","descr"]);
let cEst = acharColuna(ex,["estoque"]);

dados = dados.map(l=>({
grupo:l[cGrupo],
nome:l[cNome],
estoque:Number(l[cEst])||0,
raw:l
}));

banco[lojaAtual()].estoque = dados;
renderTudo();
};

r.readAsArrayBuffer(e.target.files[0]);
}

// ===== RENDER ABC =====
function renderABC(){

let dados = banco[lojaAtual()].abc;
let busca = document.getElementById("buscaABC").value.toLowerCase();

let diasN = Number(document.getElementById("diasN").value)||5;
let diasE = Number(document.getElementById("diasE").value)||10;

let html="<table><tr><th>Produto</th><th>Estoque</th><th>Vendidos</th><th>Média</th><th>Necessidade</th><th>Excesso</th></tr>";

dados.forEach(d=>{

if(busca && !Object.values(d.raw).join(" ").toLowerCase().includes(busca)) return;

let media = d.vendidos/30;
let necessidade = (media*diasN)-d.estoque;
let excesso = d.estoque-(media*diasE);

let cls="";
if(necessidade>0) cls="baixo";
else if(excesso>0) cls="alto";

html+=`<tr class="${cls}">
<td>${d.produto}</td>
<td>${d.estoque}</td>
<td>${d.vendidos}</td>
<td>${media.toFixed(2)}</td>
<td>${necessidade>0?Math.ceil(necessidade):0}</td>
<td>${excesso>0?Math.floor(excesso):0}</td>
</tr>`;
});

html+="</table>";
document.getElementById("tabelaABC").innerHTML=html;
}

// ===== RENDER ESTOQUE =====
function renderEstoque(){

let dados = banco[lojaAtual()].estoque;
let busca = document.getElementById("buscaEstoque").value.toLowerCase();

let html="<table><tr><th>Produto</th><th>Estoque</th></tr>";

dados.forEach(d=>{

if(busca && !Object.values(d.raw).join(" ").toLowerCase().includes(busca)) return;

html+=`<tr>
<td>${d.nome}</td>
<td>${d.estoque}</td>
</tr>`;
});

html+="</table>";
document.getElementById("tabelaEstoque").innerHTML=html;
}

// ===== TRANSFER =====
function sugerirTransferencias(){

let diasN = Number(document.getElementById("diasN").value)||5;
let diasE = Number(document.getElementById("diasE").value)||10;

let lojas = Object.keys(banco);
let map={};
let res=[];

lojas.forEach(l=>{
banco[l].abc.forEach(p=>{
let m=p.vendidos/30;
if(m<=0) return;

let key=(p.produto||"").toLowerCase();

if(!map[key]) map[key]=[];

map[key].push({...p, loja:l, media:m});
});
});

Object.entries(map).forEach(([prod,lista])=>{

let precisa=[], sobra=[];

lista.forEach(p=>{
let n=(p.media*diasN)-p.estoque;
let e=p.estoque-(p.media*diasE);

if(n>0) precisa.push({...p,qtd:Math.ceil(n)});
if(e>0) sobra.push({...p,qtd:Math.floor(e)});
});

precisa.forEach(p=>{
sobra.forEach(s=>{
let q=Math.min(p.qtd,s.qtd);
if(q>0){
res.push({produto:prod,de:s.loja,para:p.loja,qtd:q});
p.qtd-=q;
s.qtd-=q;
}
});
});

});

return res;
}

// ===== RENDER TRANSFER =====
function renderTransferencias(){

let lista=sugerirTransferencias();
if(!lista.length) return "Sem sugestões";

let html="<table><tr><th>Produto</th><th>De</th><th>Para</th><th>Qtd</th></tr>";

lista.forEach(t=>{
html+=`<tr>
<td>${t.produto}</td>
<td>${t.de}</td>
<td>${t.para}</td>
<td>${t.qtd}</td>
</tr>`;
});

html+="</table>";
return html;
}

// ===== GLOBAL =====
function renderTudo(){
renderABC();
renderEstoque();
document.getElementById("transferencias").innerHTML=renderTransferencias();
}

</script>

</body>
</html>
